<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Have a wonderful day</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            background: #080808;
            color: #eeeeee;
            font-family: "Courier New", monospace;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 25px;
            background: #111111;
            border: 3px solid #ffb6d9;
            box-shadow: 0 0 25px #ffb6d9;
        }

        h1 {
            margin-top: 0;
            color: #ffb6d9;
            text-shadow: 0 0 12px #ffb6d9;
        }

        .warning {
            color: orange;
            font-size: 20px;
            font-weight: bold;
        }

        .main-gif {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            border: 3px solid white;
        }

        button {
            padding: 15px 25px;
            margin: 10px;
            background: #ff8fc7;
            color: #111111;
            border: none;
            border-radius: 8px;
            box-shadow: 0 0 12px #ffb6d9;
            font-family: "Courier New", monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #ffb6d9;
            box-shadow: 0 0 20px #ffb6d9;
            transform: scale(1.03);
        }

        button:active {
            transform: scale(0.98);
        }

        #instruction {
            min-height: 70px;
            margin-top: 25px;
            color: #00ff00;
            font-size: 18px;
            line-height: 1.5;
        }

        .counter {
            margin-top: 20px;
            color: gray;
        }

        .overlay {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            justify-content: center;
            align-items: center;
        }

        .overlay img {
            display: block;
            width: 100vw;
            height: 100vh;
            margin: 0;
            border: none;
            object-fit: contain;
        }

        #emergencyOverlay {
            z-index: 9998;
        }

        .close-text {
            position: fixed;
            z-index: 10000;
            right: 15px;
            bottom: 15px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 14px;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 18px;
            }

            button {
                display: block;
                width: 100%;
                margin: 12px 0;
            }
        }
    </style>
</head>

<body>

    <main class="container">
        <h1>Heippa</h1>

        <p class="warning">
            Sait linkistä viruksen
        </p>

        <img
            class="main-gif"
            src="./giphy-shy.gif"
            alt="Hamsteri"
        >

        <button id="instructionButton" type="button">
            ANNA OHJE
        </button>

        <button id="emergencyButton" type="button">
            AKTIVOI HALAUS
        </button>

        <div id="instruction">
            Paina nappia vastaanottaaksesi ohje
        </div>

        <div class="counter">
            Vastaanotettuja ohjeita:
            <span id="count">0</span>
        </div>
    </main>

    <div id="emergencyOverlay" class="overlay">
        <img
            id="emergencyImage"
            src="./marcus-the-worm-robert-help.gif"
            alt="Halaus-GIF"
        >
        <div class="close-text">Sulje klikkaamalla</div>
    </div>

    <div id="surpriseOverlay" class="overlay">
        <img
            id="surpriseImage"
            src="./giphy-stupid.gif"
            alt="Yllätys-GIF"
        >
        <div class="close-text">Sulje klikkaamalla</div>
    </div>

    <script>
        "use strict";

        const instructions = [
            "Tarjoa siemeniä ennen kuin tarjoat mielipiteitä.",
            "Älä mainitse sanaa \"rauhoitu\". Se pahentaa tilannetta.",
            "Älä. Koske. Hätäsiemenvarastoon.",
            "Pakkaa tavarasi ja peräänny rauhallisesti. Poista sivuhistoria ja heitä puhelin jokeen.",
            "Älä tee äkillisiä liikkeitä äläkä lausu huonoja vitsejä.",
            "Viha ei häviä. Se vaihtaa vain kohdetta.",
            "Nyökkää kohteliaasti, vaikka et ymmärtäisi motiiveja.",
            "Tiedän missä asut. Tiedän myös autosi rekisterinumeron.",
            "Pidä rauhallinen ääni ja lopeta änkytys. Epävarmuuden voi haistaa.",
            "Pelkäät tyttöjä.",
            "Jos et ole saanut videota siitä, miten punainen auto parkkeerataan, älä parkkeeraa.",
            "Tiedätkö, miten tuulilasista saa vedet pois?",
            "Tämä linkki asensi laitteellesi viruksen.",
            "Huonoa makua ei voi parantaa. Se on vain myönnettävä ja hyväksyttävä.",
            "SINULLA on iso otsa.",
            "Poikkeama havaittu: käyttäydyit järkevästi.",
            "Aurajoki virtaa Turun läpi niin hitaasti, että se on enemmänkin pitkä lätäkkö kuin joki.",
            "Sinussa on potentiaalia.",
            "Tiedoksesi, että pystyn muokkaamaan sivustoa ja sen toimintaa ihan milloin vain.",
            "Mitä vähemmän siinä on sinulle järkeä, sitä paremmin se on muille ymmärrettävissä.",
            "Analyysi osoittaa, että sinusta on enemmän haittaa kuin hyötyä.",
            "Napoleonia vastaan taistelleet sotilaat eivät koskaan nähneet Eiffel-tornia, koska se rakennettiin vasta myöhemmin."
        ];

        const surpriseGifs = [
            "./giphy-shy.gif",
            "./giphy-stupid.gif",
            "./giphy-yes.gif"
        ];

        const instructionButton =
            document.getElementById("instructionButton");

        const emergencyButton =
            document.getElementById("emergencyButton");

        const instructionBox =
            document.getElementById("instruction");

        const countBox =
            document.getElementById("count");

        const surpriseOverlay =
            document.getElementById("surpriseOverlay");

        const surpriseImage =
            document.getElementById("surpriseImage");

        const emergencyOverlay =
            document.getElementById("emergencyOverlay");

        const emergencyImage =
            document.getElementById("emergencyImage");

        let count = 0;
        let surpriseTimer;
        let emergencyTimer;

        function getRandomItem(array) {
            const randomIndex =
                Math.floor(Math.random() * array.length);

            return array[randomIndex];
        }

        function restartGif(imageElement, filePath) {
            imageElement.src = "";

            setTimeout(function () {
                imageElement.src =
                    filePath + "?time=" + Date.now();
            }, 20);
        }

        function hideSurprise() {
            clearTimeout(surpriseTimer);
            surpriseOverlay.style.display = "none";
        }

        function hideEmergency() {
            clearTimeout(emergencyTimer);
            emergencyOverlay.style.display = "none";
        }

        function showSurpriseGif() {
            const selectedGif =
                getRandomItem(surpriseGifs);

            surpriseImage.onerror = function () {
                instructionBox.textContent =
                    "GIF-tiedostoa ei löytynyt: " + selectedGif;

                hideSurprise();
            };

            restartGif(surpriseImage, selectedGif);

            surpriseOverlay.style.display = "flex";

            instructionBox.textContent =
                "ERIKOISTAPAHTUMA HAVAITTU";

            surpriseTimer = setTimeout(function () {
                hideSurprise();
            }, 3000);
        }

        function giveInstruction() {
            count++;
            countBox.textContent = count;

            /*
             * Yllätys-GIF:n todennäköisyys on 10 %.
             * Testaamista varten vaihda 0.10 arvoksi 1.
             */
            const showSurprise =
                Math.random() < 0.10;

            if (showSurprise) {
                showSurpriseGif();
                return;
            }

            instructionBox.textContent =
                getRandomItem(instructions);
        }

        function activateEmergency() {
            emergencyImage.onerror = function () {
                instructionBox.textContent =
                    "Halaus-GIF-tiedostoa ei löytynyt.";

                hideEmergency();
            };

            restartGif(
                emergencyImage,
                "./marcus-the-worm-robert-help.gif"
            );

            emergencyOverlay.style.display = "flex";

            emergencyTimer = setTimeout(function () {
                hideEmergency();
            }, 3000);
        }

        instructionButton.addEventListener(
            "click",
            giveInstruction
        );

        emergencyButton.addEventListener(
            "click",
            activateEmergency
        );

        surpriseOverlay.addEventListener(
            "click",
            hideSurprise
        );

        emergencyOverlay.addEventListener(
            "click",
            hideEmergency
        );

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                hideSurprise();
                hideEmergency();
            }
        });
    </script>

</body>
</html>
