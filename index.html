            "Sinussa on potentiaalia.",

            "Mitä vähemmän siinä on sinulle järkeä, sitä paremmin se on muille ymmärrettävissä.",
            "Analyysi osoittaa, että sinusta on enemmän haittaa kuin hyötyä.",
            "Napoleonia vastaan taistelleet sotilaat eivät koskaan nähneet Eiffel-tornia, koska se rakennettiin vasta myöhemmin."
        ];

        /*
         * GIF-tiedostojen pitää olla samassa kansiossa

        const surpriseGifs = [

            "./giphy-stupid.gif",
            "./giphy-yes.gif"
        ];

        const instructionButton =
            document.getElementById("instructionButton");

            document.getElementById("emergencyButton");

        const instructionBox =

        const countBox =

        const randomGifOverlay =
            document.getElementById("randomGifOverlay");

        const randomGifImage =

        const emergencyGif =
            document.getElementById("emergencyGif");

        const emergencyGifImage =

        let count = 0;

        /*
         * Esiladataan GIF-tiedostot, jotta ne näkyvät

         */
        surpriseGifs.forEach(function (gifPath) {
            const preloadImage = new Image();

        function getRandomItem(items) {
            const randomIndex =
                Math.floor(Math.random() * items.length);

            return items[randomIndex];

        function restartGif(imageElement, gifPath) {
            /*
             * Aikaleima pakottaa selaimen lataamaan GIF-animaation

             */
            imageElement.src =
                gifPath + "?restart=" + Date.now();

            randomGifOverlay.style.display = "none";
            randomGifImage.removeAttribute("src");

        function showRandomGif() {
            const randomGif = getRandomItem(surpriseGifs);

            clearTimeout(randomGifTimer);

            restartGif(randomGifImage, randomGif);

            randomGifOverlay.style.display = "flex";

            randomGifTimer = setTimeout(function () {
                hideRandomGif();

            const showSurprise = Math.random() < 0.05;

                showRandomGif();

            count++;

        );

        );

         * Escape-näppäin sulkee avoimen GIF-näkymän.
         */
        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                hideRandomGif();
                hideEmergencyGif();
            }
        });
    </script>
