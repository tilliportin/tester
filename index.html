<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>have a wonderful day u f</title>

<style>
body {
    background: #080808;
    color: #eeeeee;
    font-family: "Courier New", monospace;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #111;
    border: 3px solid #ffb6d9;
    padding: 25px;
    box-shadow: 0 0 25px #ffb6d9;
}

h1 {
    color: #ffb6d9;
    text-shadow: 0 0 12px #ffb6d9;
}

.warning {
    color: orange;
    font-size: 20px;
    font-weight: bold;
}

img {
    max-width: 100%;
    margin: 20px 0;
    border: 3px solid white;
}

button {
    background: #ff8fc7;
    color: #111;
    border: none;
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    font-family: "Courier New", monospace;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: 0 0 12px #ffb6d9;
    transition: 0.2s;
}

button:hover {
    background: #ffb6d9;
    box-shadow: 0 0 20px #ffb6d9;
    transform: scale(1.03);
}

#instruction {
    margin-top: 25px;
    min-height: 70px;
    color: #00ff00;
    font-size: 18px;
}

.counter {
    color: gray;
    margin-top: 20px;
}


/* Halaus-GIF koko ruudulle */
#emergencyGif {
    display: none;
    position: fixed;
    z-index: 9998;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    justify-content: center;
    align-items: center;
}

#emergencyGif img {
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    margin: 0;
    border: none;
    object-fit: contain;
}

/* Satunnainen yllätys-GIF koko ruudulle */
#randomGifOverlay {
    display: none;
    position: fixed;
    z-index: 9999;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: black;
    justify-content: center;
    align-items: center;
}

#randomGifImage {
    width: 100%;
    height: 100%;
    max-width: none;
    max-height: none;
    margin: 0;
    border: none;
    object-fit: contain;
}
</style>

</head>

<body>

<div class="container">

<h1>Heippa</h1>

<p class="warning">
Sait linkistä viruksen
</p>

<img src="giphy.gif" alt="Angry Hamster">

<br>

<button onclick="giveInstruction()">
ANNA OHJE
</button>

<button onclick="activateEmergency()">
AKTIVOI HALAUS
</button>

<div id="instruction">
Paina nappia vastaanottaaksesi ohje
</div>

<div class="counter">
Vastaanotettuja ohjeita: <span id="count">0</span>
</div>
<img id="surpriseGif"
     src=""
     alt="Yllätys-GIF"
     style="display:none; max-width:100%; margin-top:20px;">
</div>


<!-- Piilotettu yllätys-GIF -->

<div id="emergencyGif">
    <img src="marcus-the-worm-robert-help.gif" alt="Halaus-GIF">
</div>

<div id="randomGifOverlay">
    <img id="randomGifImage" alt="">
</div>


<script>

const instructions = [
"Tarjoa siemeniä ennen kuin tarjoat mielipiteitä.",
"Älä mainitse sanaa \"rauhoitu\". Se pahentaa tilannetta.",
"Älä. Koske. Hätäsiemenvarastoon.",
"Pakkaa tavarasi ja peräänny rauhallisesti. Poista sivuhistoria ja heitä puhelin jokeen.",
"Älä tee äkillisiä liikkeitä, äläkä lausu huonoja vitsejä.",
"Viha ei häviä. Se vaihtaa vain kohdetta.",
"Nyökkää kohteliaasti, vaikka et ymmärtäisi motiiveja.",
"Tiedän missä asut. Tiedän myös autosi rekisterinumeron",
"Pidä rauhallinen ääni ja lopeta änkytys, epävarmuuden voi haistaa.",
"Pelkäät tyttöjä.",
"Jos et ole saanut videota, miten parkkeerata punainen auto, älä parkkeeraa.",
"Tiedätkö miten tuulilasista saa vedet pois?",
"Tämä linkki asensi laitteellisi viruksen.",
"Huonoa makua ei voi parantaa, se on vain myönnettävä ja hyväksyttävä.",
"SINULLA on iso otsa.",
"Poikkeama havaittu: käyttäydyit järkevästi.",
"Aurajoki virtaa Turun läpi niin hitaasti, että se on olevan enemmänkin pitkä lätäkkö kuin joki.",
"Sinussa on potentiaalia.",
"Tiedoksesi, että pystyn muokkaamaan sivustoa ja sen toimintaa ihan milloin vain.",
"Mitä vähemmän siinä on järkeä sulle, niin sitä paremmin se on muilla ymmärrettävissä.",
"Analyysi osoittaa, että sinusta on enemmän haittaa, kuin hyötyä.",
"Napoleonia vastaan taistelleet sotilaat eivät koskaan nähneet Eiffel-tornia. D44 koska se rakennettiin vasta myöhemmin."



];

const surpriseGifs = [
    "giphy-shy.gif",
    "giphy-stupid.gif"
];

let count = 0;

function giveInstruction() {
    const instructionBox = document.getElementById("instruction");
    const overlay = document.getElementById("randomGifOverlay");
    const image = document.getElementById("randomGifImage");

    // 5 % mahdollisuus näyttää yllätys-GIF.
    if (Math.random() < 0.05) {
        const randomGif =
            surpriseGifs[Math.floor(Math.random() * surpriseGifs.length)];

        // Tyhjentäminen käynnistää GIF-animaation uudelleen.
        image.src = "";
        image.src = randomGif;

        overlay.style.display = "flex";
        instructionBox.textContent = "ERIKOISTAPAHTUMA HAVAITTU";

        setTimeout(function () {
            overlay.style.display = "none";
            image.src = "";
        }, 2000);
    } else {
        const random =
            Math.floor(Math.random() * instructions.length);

        instructionBox.textContent = instructions[random];
    }

    count++;
    document.getElementById("count").textContent = count;
}

function activateEmergency() {

    let gif = document.getElementById("emergencyGif");

    gif.style.display = "flex";

    setTimeout(function() {
        gif.style.display = "none";
    }, 3000);

}

</script>

</body>
</html>
~
